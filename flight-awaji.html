  <script>
    // ⚠️ 발급한 Google API 키를 여기에 넣으세요 (Map Tiles API 사용설정 + HTTP 리퍼러 제한 필수)

  <script src="https://unpkg.com/cesium@1.124/Build/Cesium/Cesium.js"></script>
  <script>
  // ════════ 강남 포토리얼 3D 드라이브 (CesiumJS + Google 3D Tiles) ════════
  var GANGNAM = { lat: 34.6157, lng: 135.0211 }; // 아카시 해협대교에서 출발
  var AUTO_CRUISE = 194, ARRIVE_RADIUS = 800;
  var MAX_SPEED = 84, MAX_REVERSE = -16, ACCEL = 42, BRAKE = 70, FRICTION = 4, TURN_RATE = 42;
  // 추격 카메라 파라미터 (미터)
  var CAM_BACK = 130, CAM_UP = 55, CAM_PITCH = -14;
  var JET_OFFSET = 700; // 지면/옥상 위 비행 높이(m) // 절대 비행 고도(m) — 건물 위 일정 고도로 평탄 비행

  var LANDMARKS = [
    { name: "아카시 해협대교", lat: 34.6157, lng: 135.0211, pin: "🌉" },
    { name: "아와지 유메부타이", lat: 34.6200, lng: 135.0090, pin: "🏞️" },
    { name: "아와지 하나사지키", lat: 34.5740, lng: 134.9890, pin: "🌷" },
    { name: "혼푸쿠지(물의 절)", lat: 34.5560, lng: 134.9940, pin: "⛩️" },
    { name: "이자나기 신궁", lat: 34.4597, lng: 134.8567, pin: "⛩️" },
    { name: "스모토성", lat: 34.3450, lng: 134.9050, pin: "🏯" },
    { name: "게이노마쓰바라", lat: 34.3050, lng: 134.7250, pin: "🏖️" },
    { name: "오나루토교", lat: 34.2425, lng: 134.6494, pin: "🌉" }
  ];

  var state = { lat: GANGNAM.lat, lng: GANGNAM.lng, heading: 0, speed: 0, dist: 0 };
  var keys = {}, carEl = document.getElementById("car");
  carEl.style.transform = "translate(-50%, -50%)"; // 후방 뷰라 기울임 불필요

  var warnTimer = null;
  function showWarn(msg, color, persist) {
    var w = document.getElementById("warn"); w.style.display = "block";
    if (color) w.style.background = color; w.innerHTML = msg;
    if (warnTimer) clearTimeout(warnTimer);
    if (!persist) warnTimer = setTimeout(function(){ w.style.display = "none"; }, 3500);
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  document.addEventListener("keydown", function(e){
    keys[e.code]=true;
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].indexOf(e.code)>=0) e.preventDefault();
    if(e.code==="ArrowDown") JET_OFFSET = Math.min(2500, JET_OFFSET + 25);        // 고도 상승
    else if(e.code==="ArrowUp") JET_OFFSET = Math.max(40, JET_OFFSET - 25);   // 고도 하강
    if(e.code==="KeyX") AUTO_CRUISE = Math.min(320, AUTO_CRUISE + 8);   // 속도 +
    if(e.code==="KeyZ") AUTO_CRUISE = Math.max(8, AUTO_CRUISE - 8); if((e.code==="ArrowLeft"||e.code==="ArrowRight") && course.active) course.active=false; // 속도 -
  });
  document.addEventListener("keyup", function(e){ keys[e.code]=false; });
  function m2ll(dN,dE,lat){ return { dLat:dN/111320, dLng:dE/(111320*Math.cos(lat*Math.PI/180)) }; }
  function haversine(la1,lo1,la2,lo2){ var R=6371000,t=Math.PI/180,dLa=(la2-la1)*t,dLo=(lo2-lo1)*t; var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)*Math.sin(dLo/2); return 2*R*Math.asin(Math.sqrt(a)); }
  function bearingDeg(la1,lo1,la2,lo2){ var t=Math.PI/180,y=Math.sin((lo2-lo1)*t)*Math.cos(la2*t),x=Math.cos(la1*t)*Math.sin(la2*t)-Math.sin(la1*t)*Math.cos(la2*t)*Math.cos((lo2-lo1)*t); return (Math.atan2(y,x)*180/Math.PI+360)%360; }
  function fmtTime(ms){ var s=Math.floor(ms/1000); return (""+Math.floor(s/60)).padStart(2,"0")+":"+(""+(s%60)).padStart(2,"0"); }

  // ── Cesium 초기화 ──
  var viewer, scene, tileset, routeEntity = null, lastGround = 30, ready = false;
  (async function init(){
    if (window.GOOGLE_API_KEY === "YOUR_GOOGLE_API_KEY") {
      document.getElementById("loading").innerHTML = "🔑 Google API 키가 설정되지 않았습니다.<br><small>3d.html 의 GOOGLE_API_KEY 를 발급키로 교체하세요.</small>";
      return;
    }
    try {
      viewer = new Cesium.Viewer("cesiumContainer", {
        baseLayer: false, globe: false, baseLayerPicker: false, geocoder: false, homeButton: false,
        sceneModePicker: false, navigationHelpButton: false, animation: false, timeline: false,
        fullscreenButton: false, selectionIndicator: false, infoBox: false, requestRenderMode: false
      });
      scene = viewer.scene;
      scene.skyAtmosphere.show = true;
      scene.screenSpaceCameraController.enableInputs = false; // 우리가 직접 운전
      viewer.cesiumWidget.creditContainer.style.display = "none";

      Cesium.GoogleMaps.defaultApiKey = window.GOOGLE_API_KEY;
      tileset = await Cesium.createGooglePhotorealistic3DTileset();
      scene.primitives.add(tileset); tileset.maximumScreenSpaceError = 18;

      LANDMARKS.forEach(addEntity);
      document.getElementById("loading").style.display = "none";
      ready = true;
      requestAnimationFrame(tick);

      var introEl = document.getElementById("intro");
      introEl.classList.add("show");
      setTimeout(function(){ introEl.classList.remove("show"); }, 3400);
      startCourse();
    } catch (e) {
      document.getElementById("loading").innerHTML = "❌ 3D 타일 로드 실패: " + esc(e.message || String(e)) +
        "<br><small>키 제한(리퍼러/Map Tiles API)·결제 활성화를 확인하세요.</small>";
    }
  })();

  // ── 랜드마크 (Cesium 엔티티) ──
  function addEntity(item){
    item.entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(item.lng, item.lat, lastGround + 2),
      point: { pixelSize: 9, color: Cesium.Color.fromCssColorString("#2b6cff"), outlineColor: Cesium.Color.WHITE, outlineWidth: 2, disableDepthTestDistance: Number.POSITIVE_INFINITY },
      label: { text: item.pin + " " + item.name, font: "700 13px sans-serif", fillColor: Cesium.Color.WHITE,
        showBackground: true, backgroundColor: Cesium.Color.fromCssColorString("rgba(20,20,28,0.82)"),
        backgroundPadding: new Cesium.Cartesian2(7,4), pixelOffset: new Cesium.Cartesian2(0,-16),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM, disableDepthTestDistance: Number.POSITIVE_INFINITY,
        scaleByDistance: new Cesium.NearFarScalar(200, 1.0, 3000, 0.5) }
    });
  }
  function refreshEntity(item){
    if (!item.entity) return;
    item.entity.label.text = (item.visited ? "✅ " : item.pin + " ") + item.name;
    item.entity.label.fillColor = item.visited ? Cesium.Color.fromCssColorString("#9fe0b5") : Cesium.Color.WHITE;
    item.entity.point.color = item.visited ? Cesium.Color.fromCssColorString("#15803d") : Cesium.Color.fromCssColorString("#2b6cff");
  }

  // ── 주행 ──
  function manualDrive(dt){
    state.speed = AUTO_CRUISE;                          // 스로틀(X/Z로 조절, 유지됨)
    if (keys.ArrowLeft) state.heading += TURN_RATE*dt;  // ← 좌선회
    if (keys.ArrowRight) state.heading -= TURN_RATE*dt; // → 우선회
    var rad=state.heading*Math.PI/180, d=m2ll(Math.cos(rad)*state.speed*dt, Math.sin(rad)*state.speed*dt, state.lat);
    state.lat+=d.dLat; state.lng+=d.dLng; state.dist+=state.speed*dt;
  }
  function autoDrive(dt){
    var path=course.path, cum=course.cum, total=course.total;
    if (!path || path.length<2 || !total) return;
    var seg=course.segHint||0;
    var dirCur=bearingDeg(path[seg][1],path[seg][0],path[seg+1][1],path[seg+1][0]);
    var target=AUTO_CRUISE;
    if (seg<path.length-2){
      var dirNext=bearingDeg(path[seg+1][1],path[seg+1][0],path[seg+2][1],path[seg+2][0]);
      var turn=Math.abs(((dirCur-dirNext+540)%360)-180), lead=Math.max(40,course.curSpeed*1.6);
      if (turn>22 && (cum[seg+1]-course.s)<lead) target=Math.max(9,AUTO_CRUISE*(1-turn/150));
    }
    course.curSpeed += Math.max(-75*dt, Math.min(24*dt, target-course.curSpeed));
    course.s = Math.min(total, course.s + course.curSpeed*dt);
    while (seg<cum.length-2 && cum[seg+1]<course.s) seg++;
    course.segHint=seg;
    var segLen=cum[seg+1]-cum[seg], f=segLen>0?(course.s-cum[seg])/segLen:0, a=path[seg], b=path[seg+1];
    state.lng=a[0]+(b[0]-a[0])*f; state.lat=a[1]+(b[1]-a[1])*f;
    var tgtH=bearingDeg(a[1],a[0],b[1],b[0]), diff=((tgtH-state.heading+540)%360)-180;
    state.heading += diff*(1-Math.exp(-1.4*dt)); // 비행기식 부드러운 뱅킹 선회
    state.speed=course.curSpeed; state.dist+=course.curSpeed*dt;
  }
  function setCoursePath(coords){
    course.path=coords; var cum=[0];
    for (var i=1;i<coords.length;i++) cum[i]=cum[i-1]+haversine(coords[i-1][1],coords[i-1][0],coords[i][1],coords[i][0]);
    course.cum=cum; course.total=cum[cum.length-1]||0; course.s=0; course.curSpeed=0; course.segHint=0;
  }

  // ── 카메라 + 차 스프라이트 (매 프레임) ──
  function renderFrame(){
    // 지면/옥상을 낮게 추종(가까워 또렷). 부드럽게 따라가 상하 튐 방지
    if (scene.sampleHeight) { var gh = scene.sampleHeight(Cesium.Cartographic.fromDegrees(state.lng, state.lat)); if (gh !== undefined && !isNaN(gh)) lastGround += (gh - lastGround) * 0.08; }
    var carPos = Cesium.Cartesian3.fromDegrees(state.lng, state.lat, lastGround + JET_OFFSET);
    var _a=document.getElementById("alt"); if(_a)_a.textContent=Math.round(lastGround + JET_OFFSET);
    // 차 뒤·위에서 바라보는 추격 카메라
    var headRad = Cesium.Math.toRadians(state.heading);
    var enu = Cesium.Transforms.eastNorthUpToFixedFrame(carPos);
    var e = -Math.sin(headRad)*CAM_BACK, n = -Math.cos(headRad)*CAM_BACK, u = CAM_UP;
    var camPos = Cesium.Matrix4.multiplyByPoint(enu, new Cesium.Cartesian3(e, n, u), new Cesium.Cartesian3());
    viewer.camera.setView({ destination: camPos, orientation: { heading: headRad, pitch: Cesium.Math.toRadians(CAM_PITCH), roll: 0 } });
    // 차 SVG를 실제 차 위치에 투영
    var win = Cesium.SceneTransforms.worldToWindowCoordinates(scene, carPos);
    if (win) { carEl.style.left = win.x + "px"; carEl.style.top = win.y + "px"; carEl.style.display = "block"; }
    else carEl.style.display = "none";
  }

  // ── 게임 루프 ──
  var lastT = 0;
  function tick(t){
    var dt = lastT ? Math.min((t-lastT)/1000, 0.05) : 0; lastT = t;
    if (course.active) { if (course.path) autoDrive(dt); } else manualDrive(dt);
    renderFrame();
    updateCourse(t);
    document.getElementById("spd").textContent = Math.round(Math.abs(state.speed)*3.6);
    document.getElementById("dist").textContent = (state.dist/1000).toFixed(2);
    document.querySelector("#gauge > i").style.width = (Math.abs(state.speed)/MAX_SPEED*100) + "%";
    requestAnimationFrame(tick);
  }

  // ── 코스 ──
  var course = { active:false, order:[], done:0, startT:null, path:null, cum:null, total:0, s:0, curSpeed:0, segHint:0 };
  function nearestNeighbor(lat,lng){ var rem=LANDMARKS.slice(),r=[],cLat=lat,cLng=lng; while(rem.length){var bi=0,bd=Infinity;for(var i=0;i<rem.length;i++){var d=haversine(cLat,cLng,rem[i].lat,rem[i].lng);if(d<bd){bd=d;bi=i;}}var nx=rem.splice(bi,1)[0];r.push(nx);cLat=nx.lat;cLng=nx.lng;}return r; }
  function seqLength(seq,sLat,sLng){ var d=0,pLat=sLat,pLng=sLng; for(var i=0;i<seq.length;i++){d+=haversine(pLat,pLng,seq[i].lat,seq[i].lng);pLat=seq[i].lat;pLng=seq[i].lng;} return d; }
  function twoOpt(seq,sLat,sLng){ var best=seq.slice(),n=best.length,improved=true,pass=0; while(improved&&pass<40){improved=false;pass++;var bl=seqLength(best,sLat,sLng);for(var i=0;i<n-1;i++)for(var k=i+1;k<n;k++){var c=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));var cl=seqLength(c,sLat,sLng);if(cl<bl-1){best=c;bl=cl;improved=true;}}}return best; }
  function dedupeStops(seq){ var kept=[]; seq.forEach(function(p){ if(!kept.some(function(q){return haversine(p.lat,p.lng,q.lat,q.lng)<480;})) kept.push(p); }); return kept; }
  function buildStops(lat,lng){ return dedupeStops(twoOpt(nearestNeighbor(lat,lng),lat,lng)); }
  function fetchRoadRoute(coords){
    var path=coords.map(function(c){return c[0]+","+c[1];}).join(";");
    return fetch("https://router.project-osrm.org/route/v1/driving/"+path+"?overview=full&geometries=geojson")
      .then(function(r){return r.json();}).then(function(j){ return (j&&j.code==="Ok"&&j.routes&&j.routes.length)?j.routes[0]:null; }).catch(function(){return null;});
  }
  function setRoute(coords){
    if (routeEntity) viewer.entities.remove(routeEntity);
    if (!coords.length) { routeEntity=null; return; }
    routeEntity = null; // 비행 모드: 경로선 미표시
  }
  // 웨이포인트를 부드러운 곡선으로 (코너에서 카메라가 휙 안 돌게)
  function smoothPath(pts, perSeg){
    if (pts.length < 3) return pts.slice();
    function pt(i){ return pts[Math.max(0, Math.min(pts.length-1, i))]; }
    var out = [];
    for (var i=0;i<pts.length-1;i++){
      var p0=pt(i-1),p1=pt(i),p2=pt(i+1),p3=pt(i+2);
      for (var j=0;j<perSeg;j++){
        var t=j/perSeg, t2=t*t, t3=t2*t;
        var lng=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
        var lat=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
        out.push([lng,lat]);
      }
    }
    out.push(pts[pts.length-1]);
    return out;
  }
  function startCourse(){
    LANDMARKS.forEach(function(p){ if(p.visited){p.visited=false;refreshEntity(p);} });
    course.order=dedupeStops(LANDMARKS.slice().sort(function(a,b){return b.lat-a.lat;})); course.done=0; course.startT=null; course.active=true; course.path=null;
    var coords=[[state.lng,state.lat]]; course.order.forEach(function(p){coords.push([p.lng,p.lat]);});
    coords = smoothPath(coords, 28); // 부드러운 곡선 비행 경로
    setRoute(coords);
    document.getElementById("courseBtn").textContent="■ 코스 중단"; document.getElementById("courseInfo").style.display="flex";
    setCoursePath(coords); // 직선 비행 경로 (도로 불필요)
    showWarn("✈️ 아와지시마 상공 비행 — 8곳 순회", "#15803d");
    updateCourse(0);
  }
  function stopCourse(){ course.active=false; course.path=null; state.speed=0; setRoute([]); document.getElementById("courseBtn").textContent="✈️ 아와지 F-15 비행 시작"; document.getElementById("courseInfo").style.display="none"; }
  function finishCourse(t){
    var total=fmtTime((t&&course.startT)?(t-course.startT):0); course.active=false; course.path=null; state.speed=0; setRoute([]);
    document.getElementById("courseProg").textContent=LANDMARKS.length+"/"+LANDMARKS.length; document.getElementById("courseInfo").style.display="none";
    document.getElementById("courseBtn").textContent="✈️ 아와지 F-15 비행 시작";
    document.getElementById("finishCount").textContent=LANDMARKS.length; document.getElementById("finishTime").textContent=total;
    document.getElementById("finish").classList.add("show");
  }
  var arrivalTimer=null;
  function showArrival(names){ var el=document.getElementById("arrival"); el.innerHTML='<div class="t1">🏥 도착</div><div class="t2">'+names.map(esc).join("<br>")+"</div>"; el.classList.remove("show"); void el.offsetWidth; el.classList.add("show"); if(arrivalTimer)clearTimeout(arrivalTimer); arrivalTimer=setTimeout(function(){el.classList.remove("show");},2200); }
  function updateCourse(t){
    if (course.startT===null && t) course.startT=t;
    var next=null,nd=Infinity,arrived=[];
    for (var i=0;i<LANDMARKS.length;i++){ var p=LANDMARKS[i], d=haversine(state.lat,state.lng,p.lat,p.lng);
      if (!p.visited && d<ARRIVE_RADIUS){ p.visited=true; refreshEntity(p); course.done++; arrived.push(p.name); continue; }
      if (!p.visited && d<nd){ nd=d; next=p; } }
    if (arrived.length) showArrival(arrived);
    if (course.done>=LANDMARKS.length){ finishCourse(t); return; }
    if (course.path && course.total && course.s>=course.total-0.5){ finishCourse(t); return; }
    document.getElementById("courseProg").textContent=course.done+"/"+LANDMARKS.length;
    document.getElementById("courseTime").textContent=fmtTime((t&&course.startT)?(t-course.startT):0);
    if (next){ document.getElementById("courseNext").innerHTML="<b>"+esc(next.name)+"</b>";
      document.getElementById("courseDist").textContent=nd>=1000?(nd/1000).toFixed(2)+"km":Math.round(nd)+"m";
      document.getElementById("courseArrow").style.transform="rotate("+(bearingDeg(state.lat,state.lng,next.lat,next.lng)-state.heading)+"deg)"; }
    var remEl=document.getElementById("courseRemain");
    if (course.path && course.total){ var road=Math.max(0,course.total-course.s); remEl.textContent="· 남은 "+(road/1000).toFixed(1)+"km · 약 "+Math.max(1,Math.round(road/AUTO_CRUISE/60))+"분"; } else remEl.textContent="";
  }

  document.getElementById("courseBtn").addEventListener("click", function(){ if(!ready)return; if(course.active)stopCourse(); else startCourse(); this.blur(); });
  document.getElementById("finishBtn").addEventListener("click", function(){ document.getElementById("finish").classList.remove("show"); startCourse(); });
  </script>
</body>
