<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>강남 임원 거리뷰 순례 🚶</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b1020;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
  #pano { position: absolute; inset: 0; background: #0b1020; }

  #topbar { position: absolute; left: 50%; top: 16px; transform: translateX(-50%); z-index: 20;
    background: rgba(20,20,28,.82); color: #fff; border-radius: 14px; padding: 11px 20px; backdrop-filter: blur(8px);
    box-shadow: 0 6px 24px rgba(0,0,0,.4); text-align: center; max-width: 92vw; }
  #topbar .prog { font-size: 12px; opacity: .8; letter-spacing: 1px; }
  #topbar .name { font-size: 19px; font-weight: 800; margin-top: 2px; }

  #ctrl { position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%); z-index: 20; display: flex; gap: 10px; }
  #ctrl button { border: none; cursor: pointer; background: rgba(20,20,28,.82); color: #fff; font-size: 15px; font-weight: 700;
    padding: 11px 18px; border-radius: 12px; backdrop-filter: blur(8px); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
  #ctrl .play { background: #2b6cff; }

  #maker { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 20; font-size: 15px; font-weight: 700;
    color: #fff; white-space: nowrap; background: rgba(20,20,28,.6); padding: 6px 14px; border-radius: 10px; backdrop-filter: blur(6px); text-shadow: 0 1px 4px rgba(0,0,0,.7); }
  #maker a { color: #8ab4ff; text-decoration: none; font-weight: 800; }

  #debug { position: absolute; left: 12px; bottom: 56px; z-index: 30; background: rgba(0,0,0,.7); color: #9fe; font-size: 11px;
    font-family: monospace; padding: 8px 10px; border-radius: 8px; max-width: 70vw; white-space: pre-wrap; line-height: 1.5; }

  #loading { position: absolute; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; background: #0b1020; color: #fff; font-size: 16px; text-align: center; padding: 20px; }
</style>
</head>
<body>
  <div id="pano"></div>
  <div id="topbar"><div class="prog"><span id="prog">1/27</span> · 거리뷰 순례</div><div class="name" id="name">—</div></div>
  <div id="ctrl"><button id="prev">⏮ 이전</button><button id="play" class="play">⏯ 자동</button><button id="next">다음 ⏭</button></div>
  <div id="debug">진단: 시작…</div>
  <div id="maker">제작자 <a href="https://neoskepticmd.substack.com" target="_blank" rel="noopener noreferrer">Neoskepticmd.substack.com</a></div>
  <div id="loading">🛰️ 네이버 거리뷰를 불러오는 중…</div>

  <script>
    function dbg(m){ var d=document.getElementById("debug"); if(d) d.textContent="진단: "+m; if(window.console)console.log("[SV]",m); }
    window.addEventListener("error", function(e){ dbg("JS오류 "+(e.message||"")+" @"+(e.lineno||"?")); });
    window.navermap_authFailure = function(){ dbg("네이버 인증실패 → 도메인 등록 필요"); document.getElementById("loading").innerHTML="🔑 네이버 인증 실패<br><small>NCP Maps 앱 Web 서비스 URL에 https://neoasepticism.github.io 등록 필요</small>"; };
  </script>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=uf8n95bwx2&submodules=panorama"></script>
  <script>
  var LANDMARKS = [
    { name: "맹우재 지힐링스퀘어의원", lat: 37.51685, lng: 127.02214 },
    { name: "진옥현 강남연세우노비뇨기과의원", lat: 37.49860, lng: 127.03087 },
    { name: "송정환 연세코앤이비인후과의원", lat: 37.49981, lng: 127.02718 },
    { name: "노복균 에스원성형외과의원", lat: 37.52499, lng: 127.02719 },
    { name: "박현수 박소아청소년과의원", lat: 37.48499, lng: 127.08782 },
    { name: "권장덕 권장덕K성형외과의원", lat: 37.52536, lng: 127.02812 },
    { name: "심동석 심동석신경과의원", lat: 37.52738, lng: 127.02940 },
    { name: "최주현·구형진 눈에미소안과의원", lat: 37.49555, lng: 127.02929 },
    { name: "김유석 강남연세이비인후과의원", lat: 37.51769, lng: 127.04077 },
    { name: "한재욱 서울포레스트정신건강의학과의원", lat: 37.52302, lng: 127.04220 },
    { name: "조원영 강남지인병원", lat: 37.51279, lng: 127.03505 },
    { name: "이상우 이상피부과의원", lat: 37.48905, lng: 127.06719 },
    { name: "박준규 슈어스성형외과의원", lat: 37.49895, lng: 127.02765 },
    { name: "송용섭 서울강남재활의학과의원", lat: 37.49585, lng: 127.05275 },
    { name: "방숙현 DR피부과의원", lat: 37.52293, lng: 127.03986 },
    { name: "양준상 양준상의원", lat: 37.52336, lng: 127.03838 },
    { name: "이성렬 담소유병원", lat: 37.51487, lng: 127.03463 },
    { name: "이정엽 압구정현대이비인후과의원", lat: 37.52857, lng: 127.03216 },
    { name: "홍성수 비에비스나무병원", lat: 37.50957, lng: 127.03241 },
    { name: "고홍기 굿모닝라이프소아청소년과의원", lat: 37.51614, lng: 127.03967 },
    { name: "양혁재 메드렉스병원", lat: 37.51490, lng: 127.02998 },
    { name: "유민재 닥터스피부과의원 신사점", lat: 37.51678, lng: 127.02011 },
    { name: "강형근 더비비성형외과의원", lat: 37.49877, lng: 127.02779 },
    { name: "반재용 바노바기피부과의원", lat: 37.50823, lng: 127.03604 },
    { name: "정선화 두번째봄여성의원", lat: 37.52796, lng: 127.03134 },
    { name: "이형교 역삼의원", lat: 37.49357, lng: 127.04227 },
    { name: "김준헌 강남조은눈안과", lat: 37.49869, lng: 127.02877 }
  ];
  function haversine(la1,lo1,la2,lo2){var R=6371000,t=Math.PI/180,dLa=(la2-la1)*t,dLo=(lo2-lo1)*t;var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)*Math.sin(dLo/2);return 2*R*Math.asin(Math.sqrt(a));}
  function bearingDeg(la1,lo1,la2,lo2){var t=Math.PI/180,y=Math.sin((lo2-lo1)*t)*Math.cos(la2*t),x=Math.cos(la1*t)*Math.sin(la2*t)-Math.sin(la1*t)*Math.cos(la2*t)*Math.cos((lo2-lo1)*t);return (Math.atan2(y,x)*180/Math.PI+360)%360;}
  function nn(lat,lng){var rem=LANDMARKS.slice(),r=[],cLat=lat,cLng=lng;while(rem.length){var bi=0,bd=Infinity;for(var i=0;i<rem.length;i++){var d=haversine(cLat,cLng,rem[i].lat,rem[i].lng);if(d<bd){bd=d;bi=i;}}var nx=rem.splice(bi,1)[0];r.push(nx);cLat=nx.lat;cLng=nx.lng;}return r;}

  var order = [], idx = 0, pano = null, playing = false, timer = null;
  function hideLoading(){ var l=document.getElementById("loading"); if(l) l.style.display="none"; }

  function init(){
    dbg("Panorama 준비됨 → 초기화");
    order = nn(37.4979, 127.0276);
    try {
      pano = new naver.maps.Panorama("pano", {
        position: new naver.maps.LatLng(order[0].lat, order[0].lng),
        pov: { pan: 0, tilt: 0, fov: 100 }
      });
    } catch (e) { dbg("Panorama 생성 예외: " + e.message); return; }

    naver.maps.Event.addListener(pano, "init", function(){ dbg("init OK — 거리뷰 로드됨"); hideLoading(); aimAtTarget(); setTimeout(function(){ setPlaying(true); }, 3000); });
    naver.maps.Event.addListener(pano, "pano_changed", function(){ var id = pano.getPanoId ? pano.getPanoId() : "?"; dbg("pano_changed id=" + id); hideLoading(); aimAtTarget(); });
    naver.maps.Event.addListener(pano, "pano_status", function(s){ dbg("pano_status=" + (typeof s==="object"?JSON.stringify(s):s)); });
    showAt(0);
    setTimeout(function(){ hideLoading(); if(pano && pano.getPanoId && !pano.getPanoId()) dbg("panoId 없음 — 거리뷰 타일 인증(도메인) 또는 위치에 거리뷰 없음"); }, 7000);
  }
  function aimAtTarget(){ if(!pano||!order[idx])return; var pos=pano.getPosition&&pano.getPosition(); var t=order[idx]; if(pos){ try{ pano.setPov({pan:bearingDeg(pos.lat(),pos.lng(),t.lat,t.lng),tilt:4,fov:100}); }catch(e){} } }
  function showAt(i){ idx=(i+order.length)%order.length; var t=order[idx]; document.getElementById("prog").textContent=(idx+1)+"/"+order.length; document.getElementById("name").textContent=t.name; if(pano){ pano.setPosition(new naver.maps.LatLng(t.lat,t.lng)); setTimeout(aimAtTarget,500); } }
  function go(d){ showAt(idx+d); }
  function setPlaying(p){ playing=p; document.getElementById("play").textContent=p?"⏸ 정지":"⏯ 자동"; if(timer)clearInterval(timer); if(p)timer=setInterval(function(){ if(idx+1>=order.length){setPlaying(false);return;} go(1); },6000); }

  document.getElementById("prev").addEventListener("click", function(){ go(-1); });
  document.getElementById("next").addEventListener("click", function(){ go(1); });
  document.getElementById("play").addEventListener("click", function(){ setPlaying(!playing); });
  document.addEventListener("keydown", function(e){ if(e.key==="ArrowLeft")go(-1); else if(e.key==="ArrowRight")go(1); else if(e.code==="Space"){e.preventDefault();setPlaying(!playing);} });

  if (!(window.naver && naver.maps)) dbg("naver.maps 없음 (maps.js 로드 실패?)");
  var _tries = 0;
  (function whenReady(){
    if (window.naver && naver.maps && naver.maps.Panorama) { init(); }
    else if (_tries++ < 100) { if(_tries%10===0) dbg("Panorama 모듈 대기중… "+_tries); setTimeout(whenReady, 100); }
    else { dbg("Panorama 모듈 로드 실패 (서브모듈 미로드/도메인)"); document.getElementById("loading").innerHTML="거리뷰 모듈 로드 실패<br><small>도메인 등록 확인</small>"; }
  })();
  </script>
</body>
</html>
